<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Balance Section -->
      <div class="balance-section">
        <h2>Your Current Balance</h2>
        <p>৳ <span id="t-balance">595.00</span></p>
      </div>

      <!-- Button Section -->
      <div class="button-section">
        <button id="add-money-btn" class="add-money-btn">Add Money</button>
        <button id="cash-out-btn" class="cash-out-btn">Cash Out</button>
      </div>

      <!-- Form Section -->
      <div id="for-add-money" class="form-section heide">
        <h3>Add Money</h3>
        <form>
          <div class="form-group">
            <label for="amount">Amount (BDT)</label>
            <input
              type="number"
              id="amount"
              name="amount"
              placeholder="e.g., 1000"
            />
          </div>
          <div class="form-group">
            <label for="pin">PIN Number</label>
            <input
              type="password"
              id="pin"
              name="pin"
              placeholder="Enter your PIN"
              maxlength="4"
            />
          </div>
          <button id="add-btn" type="submit" class="submit-btn">Submit</button>
        </form>
      </div>
      <!-- Form Section2 -->
      <div id="for-cash-out" class="form-section">
        <h3>Cash Out</h3>
        <form>
          <div class="form-group">
            <label for="amount">Money (BDT)</label>
            <input
              type="number"
              id="amount2"
              name="amount"
              placeholder="e.g., 500"
            />
          </div>
          <div class="form-group">
            <label for="pin">PIN Number</label>
            <input
              type="password"
              id="pin2"
              name="pin"
              placeholder="Enter your PIN"
              maxlength="4"
            />
          </div>
          <button id="cash-out-b" type="submit" class="submit-btn">
            Submit  btn
          </button>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
